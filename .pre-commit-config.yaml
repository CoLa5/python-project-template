# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
default_install_hook_types: [pre-commit, commit-msg, pre-push]
default_stages: [pre-commit, pre-push, manual]
default_language_version:
  python: python3.10
repos:
  - repo: meta
    hooks:
      - id: check-useless-excludes

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-executables-have-shebangs
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
      - id: check-toml
      - id: check-yaml
      - id: debug-statements
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: name-tests-test
        args: ["--pytest-test-first"]
      - id: no-commit-to-branch
        args: [--branch, main]
        stages: [pre-commit]
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.14
    hooks:
      - id: uv-lock
      - id: uv-export
        args:
          ["--frozen", "--no-dev", "--output-file=requirements.txt", "--quiet"]

  - repo: https://github.com/tsvikas/sync-with-uv
    rev: v0.5.0
    hooks:
      - id: sync-with-uv

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.10.0
    hooks:
      - id: commitizen
        stages: [commit-msg]
      - id: commitizen-branch
        stages: [pre-push]

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      # Linter
      - id: ruff-check
        types_or: [python, pyi, pyproject]
        args: [--fix]
      # Formatter
      - id: ruff-format
        types_or: [python, pyi]

  - repo: https://github.com/crate-ci/typos
    rev: v1.45.0
    hooks:
      - id: typos

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        args:
          - --config-file=./pyproject.toml
        files: ^{{py-project}}/.*\.py$
        additional_dependencies:
          - commitizen
          - jinja2

  - repo: local
    hooks:
      - id: backticked-bool-none-in-docstrings
        name: Require `None` / `True` / `False` (backticked) in """-docstrings
        language: pygrep
        entry: '(?s)"""(?:(?!""").)*?(?<!`)(None|True|False)(?!`)(?:(?!""").)*?"""'
        files: ^{{py-project}}/.*\.py$
      - id: backticked-strings-in-docstrings
        name: Require `"..."` (backticked strings) in """-docstrings
        language: pygrep
        entry: '(?s)"""(?:(?!""").)*?(?<!`)"[^"\n]+"(?!`)(?:(?!""").)*?"""'
        files: ^{{py-project}}/.*\.py$
      - id: no-print-in-sources
        name: Ensure no print() statement appears in sources
        language: pygrep
        entry: print\(
        files: ^{{py-project}}/.*\.py$
